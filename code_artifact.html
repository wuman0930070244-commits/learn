        // --- 1. 音效控制 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundEnabled = true;

        function playSound(type) {
            if (!soundEnabled) return;
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'flip') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.08);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.08);
                osc.start(now);
                osc.stop(now + 0.08);
            } else if (type === 'match') {
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.08); // E5
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);

                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(783.99, now + 0.04); // G5
                gain2.gain.setValueAtTime(0.15, now);
                gain2.gain.linearRampToValueAtTime(0, now + 0.35);

                osc.start(now);
                osc.stop(now + 0.3);
                osc2.start(now);
                osc2.stop(now + 0.35);
            } else if (type === 'mismatch') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(120, now + 0.25);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'victory') {
                const melody = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50];
                melody.forEach((freq, index) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.type = 'triangle';
                    o.frequency.setValueAtTime(freq, now + index * 0.08);
                    g.gain.setValueAtTime(0.12, now + index * 0.08);
                    g.gain.linearRampToValueAtTime(0, now + index * 0.08 + 0.15);
                    o.start(now + index * 0.08);
                    o.stop(now + index * 0.08 + 0.15);
                });
            }
        }

                    <svg viewBox="0 0 100 100" class="w-10 h-10 sm:w-16 sm:h-16 md:w-20 md:h-20 lg:w-24 lg:h-24">
                        <ellipse cx="50" cy="68" rx="35" ry="15" fill="#744210" stroke="#4a3728" stroke-width="3" />
                        <ellipse cx="50" cy="68" rx="24" ry="10" fill="none" stroke="#975a16" stroke-width="2" />
                        <ellipse cx="50" cy="68" rx="14" ry="6" fill="none" stroke="#d69e2e" stroke-width="1.5" />
                        <path d="M45,18 L55,18 L52,45 L48,45 Z" fill="#cbd5e0" stroke="#4a5568" stroke-width="2" />
                        <path d="M48,45 L52,45 L50,55 Z" fill="#718096" />
                        <rect x="42" y="4" width="16" height="14" rx="2" fill="#975a16" />
                        <path d="M22,52 Q25,48 27,54 Z" fill="#d69e2e" />
                        <path d="M74,60 Q76,55 80,62 Z" fill="#975a16" />
                    </svg>
                `
            }
        ];

        let deck = [];          
        let flippedCards = [];  
        let matchedPairsCount = 0; 
        let movesCount = 0;     
        let timerInterval = null;
        let totalSeconds = 0;
        let isGameStarted = false;
        let isProcessing = false; 

        // --- 3. DOM 節點獲取 ---
        const gameBoard = document.getElementById('game-board');
        const timerEl = document.getElementById('timer');
        const movesEl = document.getElementById('moves');
        const progressEl = document.getElementById('progress');
        const btnRestart = document.getElementById('btn-restart');
        const btnPlayAgain = document.getElementById('btn-play-again');
        const btnSound = document.getElementById('btn-sound');
        const soundOnIcon = document.getElementById('sound-on-icon');
        const soundOffIcon = document.getElementById('sound-off-icon');

        const victoryModal = document.getElementById('victory-modal');
        const finalTimeEl = document.getElementById('final-time');
        const finalMovesEl = document.getElementById('final-moves');
        const newRecordBadge = document.getElementById('new-record-badge');
        const bestTimeEl = document.getElementById('best-time');
        const bestMovesEl = document.getElementById('best-moves');
        const bestScoreEl = document.getElementById('best-score');

        // --- 4. 遊戲初始化 ---
        function initGame() {
            flippedCards = [];
            matchedPairsCount = 0;
            movesCount = 0;
            totalSeconds = 0;
            isGameStarted = false;
            isProcessing = false;
            
            clearInterval(timerInterval);
            timerInterval = null;

            timerEl.textContent = "00:00";
            movesEl.textContent = "0";
            progressEl.textContent = "0 / 10";

            displayBestScore();

            // 生成 20 張卡牌：10張地名文字卡 + 10張物產圖片卡
            let cardsData = [];
            TAIWAN_SPECIALTIES.forEach(item => {
                // 地名文字卡
                cardsData.push({
                    matchId: item.matchId,
                    type: 'city',
                    content: item.cityName,
                    isFlipped: false,
                    isMatched: false
                });
                // 物產圖片卡
                cardsData.push({
                    matchId: item.matchId,
                    type: 'product',
                    content: item.productSvg,
                    productLabel: item.productName,
                    isFlipped: false,
                    isMatched: false
                });
            });

            // 打亂卡牌順序
            deck = cardsData.sort(() => Math.random() - 0.5);

            gameBoard.innerHTML = '';
            deck.forEach((card, index) => {
                const cardContainer = document.createElement('div');
                cardContainer.className = 'perspective-1000 w-full h-full cursor-pointer card-click-area';
                cardContainer.dataset.index = index;

                // 根據卡牌類型設定不同的背面樣式
                let backContentHtml = '';
                if (card.type === 'city') {
                    // 地名文字卡背面：復古書法質感風格
                    backContentHtml = `
                        <div class="card-back backface-hidden rotate-y-180 absolute inset-0 bg-gradient-to-br from-amber-50 to-orange-100 text-slate-800 rounded-2xl flex flex-col items-center justify-center border-4 border-amber-600 shadow-amber-500/10 shadow-inner select-none p-2">
                            <span class="text-xs text-amber-800/60 font-black border-b border-amber-800/20 pb-0.5 mb-1 md:mb-2 tracking-widest">地名考</span>
                            <span class="text-3xl sm:text-5xl md:text-6xl lg:text-7xl font-black tracking-widest text-amber-900 drop-shadow-sm">${card.content}</span>
                        </div>
                    `;
                } else {
                    // 物產圖片卡背面：深色極簡現代風格
                    backContentHtml = `
                        <div class="card-back backface-hidden rotate-y-180 absolute inset-0 bg-slate-850 rounded-2xl flex flex-col items-center justify-center border-2 border-indigo-500 shadow-indigo-500/20 shadow-inner select-none p-2 bg-slate-900">
                            <!-- 滿版的精緻 SVG 繪圖 -->
                            <div class="flex-grow flex items-center justify-center w-full">
                                ${card.content}
                            </div>
                            <span class="text-[10px] sm:text-xs md:text-sm font-black text-indigo-300 tracking-wider bg-indigo-950/80 px-2.5 py-0.5 rounded-full border border-indigo-800/40 mt-1 flex-shrink-0">${card.productLabel}</span>
                        </div>
                    `;
                }

                cardContainer.innerHTML = `
                    <div class="card-inner preserve-3d w-full h-full relative transition-transform duration-500 ease-out rounded-2xl shadow-lg border border-slate-700/30">
                        <!-- 卡牌正面 (有花紋的卡背) -->
                        <div class="card-front backface-hidden absolute inset-0 bg-gradient-to-br from-indigo-950 via-slate-900 to-indigo-900 rounded-2xl flex items-center justify-center border border-slate-700/40">
                            <div class="w-8 h-8 md:w-14 md:h-14 rounded-full border border-indigo-500/20 flex items-center justify-center animate-pulse">
                                <svg class="w-4 h-4 md:w-8 md:h-8 text-indigo-400/80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.36 1.25.588 1.81l-3.97 2.88a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.971-2.88a1 1 0 00-1.176 0l-3.97 2.88c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.364-1.118l-3.97-2.88c-.772-.56-.373-1.81.588-1.81h4.907a1 1 0 00.95-.69l1.519-4.674z" />
                                </svg>
                            </div>
                        </div>
                        <!-- 卡牌背面 (依屬性而定) -->
                        ${backContentHtml}
                    </div>
                `;

                cardContainer.addEventListener('click', () => handleCardClick(index, cardContainer));
                gameBoard.appendChild(cardContainer);
            });
        }

        // --- 5. 翻牌點擊邏輯 ---
        function handleCardClick(index, element) {
            if (isProcessing || deck[index].isFlipped || deck[index].isMatched) return;

            if (!isGameStarted) {
                startTimer();
                isGameStarted = true;
            }

            deck[index].isFlipped = true;
            flippedCards.push(index);
            
            const innerElement = element.querySelector('.card-inner');
            innerElement.classList.add('rotate-y-180');
            playSound('flip');

            if (flippedCards.length === 2) {
                movesCount++;
                movesEl.textContent = movesCount;
                checkMatch();
            }
        }

        // --- 6. 配對檢查邏輯 (地名對應物產，以 matchId 檢查) ---
        function checkMatch() {
            isProcessing = true;
            const [firstIdx, secondIdx] = flippedCards;
            const card1 = deck[firstIdx];
            const card2 = deck[secondIdx];

            const cardElements = gameBoard.querySelectorAll('.perspective-1000');
            const el1 = cardElements[firstIdx].querySelector('.card-inner');
            const el2 = cardElements[secondIdx].querySelector('.card-inner');

            if (card1.matchId === card2.matchId && card1.type !== card2.type) {
                // 配對成功！(且類型相異，即一地名、一物產)
                card1.isMatched = true;
                card2.isMatched = true;
                matchedPairsCount++;
                
                progressEl.textContent = `${matchedPairsCount} / 10`;

                setTimeout(() => {
                    el1.parentNode.classList.add('scale-105');
                    el2.parentNode.classList.add('scale-105');
                    
                    el1.querySelector('.card-back').classList.add('border-emerald-500');
                    el2.querySelector('.card-back').classList.add('border-emerald-500');

                    playSound('match');

                    setTimeout(() => {
                        el1.parentNode.classList.remove('scale-105');
                        el2.parentNode.classList.remove('scale-105');
                        
                        flippedCards = [];
                        isProcessing = false;

                        if (matchedPairsCount === 10) {
                            endGame();
                        }
                    }, 200);
                }, 300);

            } else {
                // 配對失敗：翻回去
                setTimeout(() => {
                    el1.parentNode.classList.add('animate-shake');
                    el2.parentNode.classList.add('animate-shake');
                    
                    el1.querySelector('.card-back').classList.add('border-rose-500');
                    el2.querySelector('.card-back').classList.add('border-rose-500');

                    playSound('mismatch');

                    setTimeout(() => {
                        el1.classList.remove('rotate-y-180');
                        el2.classList.remove('rotate-y-180');
                        
                        el1.querySelector('.card-back').classList.remove('border-rose-500');
                        el2.querySelector('.card-back').classList.remove('border-rose-500');

                        card1.isFlipped = false;
                        card2.isFlipped = false;
                        
                        flippedCards = [];
                        isProcessing = false;
                    }, 500);
                }, 600);
            }
        }

        // --- 7. 計時器控制 ---
        function startTimer() {
            totalSeconds = 0;
            timerInterval = setInterval(() => {
                totalSeconds++;
                timerEl.textContent = formatTime(totalSeconds);
            }, 1000);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // --- 8. 遊戲結束（通關且計算分數） ---
        function endGame() {
            clearInterval(timerInterval);
            playSound('victory');
            
            // --- 新增：綜合分數計算與評級邏輯 ---
            const baseScore = 10000;
            const timePenalty = totalSeconds * 15; // 1秒扣15分
            const movePenalty = movesCount * 100;   // 1步扣100分
            const finalScore = Math.max(100, baseScore - timePenalty - movePenalty); // 保底100分

            // 根據分數賦予評級
            let rating = 'C';
            let ratingClass = 'bg-slate-600 text-slate-100';
            if (finalScore >= 8000) {
                rating = 'S';
                ratingClass = 'bg-gradient-to-r from-yellow-400 to-amber-500 text-slate-950 animate-bounce font-black';
            } else if (finalScore >= 6500) {
                rating = 'A';
                ratingClass = 'bg-purple-600 text-white font-bold';
            } else if (finalScore >= 5000) {
                rating = 'B';
                ratingClass = 'bg-blue-600 text-white font-medium';
            }

            // 寫入畫面
            finalTimeEl.textContent = formatTime(totalSeconds);
            finalMovesEl.textContent = movesCount;
            document.getElementById('final-score').textContent = finalScore;
            
            const ratingBadge = document.getElementById('final-rating');
            ratingBadge.textContent = rating;
            ratingBadge.className = `px-2.5 py-0.5 rounded-md font-black text-sm shadow-sm ${ratingClass} transition-all duration-300`;

            // 保存紀錄 (檢查是否破紀錄，包含分數)
            const isNewRecord = saveHighScore(totalSeconds, movesCount, finalScore);

            if (isNewRecord) {
                newRecordBadge.classList.remove('hidden');
            } else {
                newRecordBadge.classList.add('hidden');
            }

            startConfetti();

            setTimeout(() => {
                victoryModal.classList.remove('opacity-0', 'pointer-events-none');
                victoryModal.querySelector('div').classList.remove('scale-90');
            }, 500);
        }

        // --- 9. 最佳紀錄管理 (LocalStorage 整合分數) ---
        function saveHighScore(time, moves, score) {
            const bestTime = localStorage.getItem('best_time_sec');
            const bestMoves = localStorage.getItem('best_moves');
            const bestScore = localStorage.getItem('best_score');
            let isNew = false;

            if (!bestTime || time < parseInt(bestTime)) {
                localStorage.setItem('best_time_sec', time);
                isNew = true;
            }
            if (!bestMoves || moves < parseInt(bestMoves)) {
                localStorage.setItem('best_moves', moves);
                isNew = true;
            }
            if (!bestScore || score > parseInt(bestScore)) {
                localStorage.setItem('best_score', score);
                isNew = true;
            }

            displayBestScore();
            return isNew;
        }

        function displayBestScore() {
            const bTime = localStorage.getItem('best_time_sec');
            const bMoves = localStorage.getItem('best_moves');
            const bScore = localStorage.getItem('best_score');

            bestTimeEl.textContent = bTime ? formatTime(parseInt(bTime)) : "--:--";
            bestMovesEl.textContent = bMoves ? bMoves : "--";
            bestScoreEl.textContent = bScore ? bScore : "--";
        }

        // --- 10. 繽紛碎紙慶祝動畫 (Canvas) ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let confettiArray = [];
        let confettiInterval = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        class Confetti {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -100 - 20;
                this.size = Math.random() * 8 + 4;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.speedX = Math.random() * 4 - 2;
                this.speedY = Math.random() * 5 + 3;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 5 + 2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function startConfetti() {
            resizeCanvas();
            confettiArray = [];
            for (let i = 0; i < 150; i++) {
                confettiArray.push(new Confetti());
            }

            if (confettiInterval) cancelAnimationFrame(confettiInterval);

            function animateConfetti() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confettiArray.forEach((c, index) => {
                    c.update();
                    c.draw();
                    if (c.y > canvas.height) {
                        confettiArray[index] = new Confetti();
                    }
                });
                confettiInterval = requestAnimationFrame(animateConfetti);
            }
            animateConfetti();

            setTimeout(() => {
                cancelAnimationFrame(confettiInterval);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }, 6000);
        }

        // --- 11. 按鈕與功能事件綁定 ---
        btnRestart.addEventListener('click', initGame);
        
        btnPlayAgain.addEventListener('click', () => {
            victoryModal.classList.add('opacity-0', 'pointer-events-none');
            victoryModal.querySelector('div').classList.add('scale-90');
            initGame();
        });

        btnSound.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            if (soundEnabled) {
                soundOnIcon.classList.remove('hidden');
                soundOffIcon.classList.add('hidden');
            } else {
                soundOnIcon.classList.add('hidden');
                soundOffIcon.classList.remove('hidden');
            }
        });

        victoryModal.addEventListener('click', (e) => {
            if (e.target === victoryModal) {
                victoryModal.classList.add('opacity-0', 'pointer-events-none');
                victoryModal.querySelector('div').classList.add('scale-90');
                initGame();
            }
        });

        // --- 12. 動態 CSS 動畫注入 ---
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20%, 60% { transform: translateX(-4px); }
                40%, 80% { transform: translateX(4px); }
            }
            .animate-shake {
                animation: shake 0.4s ease-in-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.8s ease-out;
            }
        `;
        document.head.appendChild(style);

        window.onload = () => {
            initGame();
        };
    </script>
</body>
</html>
